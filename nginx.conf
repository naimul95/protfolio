// ========================
// API Configuration
// ========================
const API_BASE_URL = 'http://localhost:3000/api';

// ========================
// SMOOTH SCROLLING
// ========================
document.querySelectorAll('a[href^="#"]').forEach(anchor => {
    anchor.addEventListener('click', function (e) {
        e.preventDefault();
        const target = document.querySelector(this.getAttribute('href'));
        if (target) {
            target.scrollIntoView({
                behavior: 'smooth',
                block: 'start'
            });
        }
    });
});

// ========================
// LOAD PROJECTS FROM API
// ========================
async function loadProjects() {
    try {
        const response = await fetch(`${API_BASE_URL}/projects`);
        const result = await response.json();

        if (result.success && result.data.length > 0) {
            const projectsGrid = document.getElementById('projects-grid');
            projectsGrid.innerHTML = '';

            result.data.forEach(project => {
                const projectCard = document.createElement('div');
                projectCard.className = 'project-card';
                projectCard.innerHTML = `
                    <div class="project-img">📱</div>
                    <div class="project-content">
                        <h3>${project.title}</h3>
                        <p>${project.description}</p>
                        <div class="project-tags">
                            ${project.technologies.map(tech => `<span class="tag">${tech}</span>`).join('')}
                        </div>
                        <div class="project-links">
                            ${project.github ? `<a href="${project.github}" target="_blank">GitHub</a>` : ''}
                            ${project.liveDemo ? `<a href="${project.liveDemo}" target="_blank">Live Demo</a>` : ''}
                        </div>
                    </div>
                `;
                projectsGrid.appendChild(projectCard);
            });
        }
    } catch (error) {
        console.error('Error loading projects:', error);
    }
}

// ========================
// LOAD SKILLS FROM API
// ========================
async function loadSkills() {
    try {
        const response = await fetch(`${API_BASE_URL}/skills`);
        const result = await response.json();

        if (result.success && result.data.length > 0) {
            const skillsGrid = document.getElementById('skills-grid');
            skillsGrid.innerHTML = '';

            result.data.forEach(skillGroup => {
                const skillCard = document.createElement('div');
                skillCard.className = 'skill-card';
                skillCard.innerHTML = `
                    <h3>${skillGroup.category}</h3>
                    <ul>
                        ${skillGroup.skills.map(skill => `<li>${skill}</li>`).join('')}
                    </ul>
                `;
                skillsGrid.appendChild(skillCard);
            });
        }
    } catch (error) {
        console.error('Error loading skills:', error);
    }
}

// ========================
// CONTACT FORM SUBMISSION
// ========================
document.getElementById('contact-form').addEventListener('submit', async (e) => {
    e.preventDefault();

    const formData = {
        name: document.getElementById('name').value,
        email: document.getElementById('email').value,
        message: document.getElementById('message').value
    };

    try {
        const response = await fetch(`${API_BASE_URL}/contact`, {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json'
            },
            body: JSON.stringify(formData)
        });

        const result = await response.json();

        if (result.success) {
            alert('✅ Message sent successfully! I will get back to you soon.');
            document.getElementById('contact-form').reset();
        } else {
            alert('❌ Error sending message. Please try again.');
        }
    } catch (error) {
        console.error('Error:', error);
        alert('❌ Error sending message. Please check your connection.');
    }
});

// ========================
// LOAD DATA ON PAGE LOAD
// ========================
window.addEventListener('load', () => {
    loadProjects();
    loadSkills();
});

// ========================
// LOG API HEALTH STATUS
// ========================
async function checkAPIHealth() {
    try {
        const response = await fetch(`${API_BASE_URL.replace('/api', '')}/health`);
        const result = await response.json();
        console.log('✅ API Health:', result);
    } catch (error) {
        console.log('⚠️ API not available:', error.message);
    }
}

checkAPIHealth();